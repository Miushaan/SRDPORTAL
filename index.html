<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SRD PORTAL | 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f1f5f9; --side: #0f172a; --brand: #6366f1; --brand-light: #e0e7ff; 
            --success: #10b981; --border: #cbd5e1; --text-main: #1e293b; 
            --text-muted: #64748b; --danger: #f43f5e; --warning: #f59e0b; 
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar Glassmorphism */
        .sidebar { 
            width: 260px; background: var(--side); color: white; display: flex; 
            flex-direction: column; padding: 40px 20px; flex-shrink: 0; z-index: 1000; 
            border-right: 1px solid rgba(255,255,255,0.1); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-box { margin-bottom: 40px; padding-left: 15px; border-left: 4px solid var(--brand); }
        .logo-box h1 { font-size: 13px; font-weight: 800; letter-spacing: 1px; }
        
        .nav-btn { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: transparent; color: #94a3b8; font-weight: 700; font-size: 11px; 
            cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; 
            margin-bottom: 8px; text-transform: uppercase; 
        }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active { background: var(--brand); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        .presence-box { margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); }
        .u-row { font-size: 10px; color: #cbd5e1; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .u-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        /* Content Area */
        .wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; position: relative; }
        
        .top-bar { 
            padding: 15px 30px; background: var(--glass); backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; z-index: 10;
        }
        
        .header-info { display: flex; align-items: center; gap: 12px; }
        .header-info h2 { font-weight: 800; font-size: 16px; white-space: nowrap; }

        .mobile-menu-btn { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-main); }

        .search-wrap { flex: 1; max-width: 300px; }
        .search-wrap input { 
            width: 100%; padding: 10px 16px; border-radius: 12px; border: 1px solid var(--border); 
            font-size: 13px; font-family: inherit; background: white;
        }

        .action-group { display: flex; gap: 8px; margin-left: auto; align-items: center; }

        .main-content { flex: 1; padding: 20px 30px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .table-container { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        table { width: 100%; border-collapse: collapse; }
        thead th { 
            background: #f8fafc; padding: 15px 20px; text-align: left; font-size: 10px; 
            font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); 
        }
        tbody td { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; font-size: 13px; vertical-align: middle; }

        /* Dynamic Status Coloring */
        .status-select { padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 800; width: 100%; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; text-align: center; }
        .s-PENDING { background: #f1f5f9; color: #64748b; }
        .s-ITEM-CREATION { background: #e0e7ff; color: #4338ca; }
        .s-PR-MTR-RAISED { background: #fef9c3; color: #854d0e; }
        .s-PO-RAISED, .s-Docked { background: #dcfce7; color: #166534; }
        .s-PAYMENT-PENDING { background: #ffedd5; color: #9a3412; }
        .s-ALL-RECEIVED { background: var(--success); color: white; }
        .s-ON-HOLD { background: #fee2e2; color: #991b1b; }
        .s-CANCELLED { background: var(--side); color: white; }

        .remarks-editor { 
            width: 100%; padding: 10px; background: #f8fafc; border-radius: 8px; font-size: 12px; 
            border: 1px solid var(--border); font-family: inherit; min-height: 38px; transition: 0.2s;
        }
        .remarks-editor:focus { background: white; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
        
        .age-badge { font-weight: 800; font-size: 10px; background: var(--brand-light); color: var(--brand); padding: 4px 8px; border-radius: 6px; }

        /* Buttons */
        .btn-main { 
            padding: 10px 14px; border-radius: 10px; font-weight: 800; border: 1px solid transparent; 
            cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.2s; 
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .btn-primary { background: var(--brand); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); color: var(--text-main); }
        .btn-completed.active-toggle { background: var(--success); color: white; border: none; }
        .btn-delete { color: #cbd5e1; background: none; border: none; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .btn-delete:hover { color: var(--danger); transform: scale(1.1); }

        /* Mobile Optimization: iPhone 12 Pro Focus */
        @media (max-width: 850px) {
            .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; }
            .sidebar.open { transform: translateX(260px); }
            .mobile-menu-btn { display: block; }
            
            .top-bar { padding: 10px 15px; flex-wrap: wrap; gap: 8px; }
            .header-info { width: 100%; justify-content: space-between; }
            .search-wrap { width: 100%; max-width: none; order: 3; }
            .action-group { width: 100%; order: 2; gap: 5px; overflow-x: auto; padding-bottom: 2px; }
            .action-group .btn-main { padding: 8px 10px; font-size: 9px; }

            .main-content { padding: 15px; }
            
            /* Enhanced Card View */
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tbody tr { background: white; margin-bottom: 15px; border-radius: 16px; border: 1px solid var(--border); padding: 15px; position: relative; }
            tbody td { 
                border: none; padding: 8px 0; border-bottom: 1px solid #f8fafc; 
                display: flex; flex-direction: column; align-items: flex-start;
            }
            tbody td:last-child { border: none; padding-top: 15px; align-items: center; }
            tbody td::before { 
                content: attr(data-label); font-size: 9px; font-weight: 800; color: var(--brand); 
                margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
            }
            .remarks-editor { background: #fff; border-style: dashed; }
            .btn-delete::before { content: 'DELETE RECORD'; font-size: 10px; font-weight: 800; margin-right: 5px; }
        }

        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: white; padding: 30px; border-radius: 24px; width: 450px; max-width: 90%; }
    </style>
</head>
<body>

    <div id="auth-overlay" style="position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 5000;">
        <div style="background: white; padding: 40px; border-radius: 28px; width: 360px; text-align: center;">
            <h2 style="font-weight: 800; margin-bottom: 20px; font-size: 18px;">SRD SYSTEM ACCESS</h2>
            <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:14px; margin-bottom:12px; border-radius:12px; border:1px solid var(--border);">
            <input type="password" id="login-pass" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; border-radius:12px; border:1px solid var(--border);">
            <button onclick="handleLogin()" class="btn-main btn-primary" style="width:100%; justify-content: center; padding: 14px;">Authenticate</button>
        </div>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="logo-box"><h1>MTCC SHIPYARD<br>PORTAL 2026</h1></div>
        <div style="flex: 1;">
            <button onclick="switchPage('DASH')" id="nav-dash" class="nav-btn active">PRF Tracker</button>
            <button onclick="switchPage('YARD')" id="nav-yard" class="nav-btn">Boat Yard Log</button>
            <button onclick="switchPage('TRANS')" id="nav-trans" class="nav-btn">Transaction Log</button>
        </div>
        <div class="presence-box" id="online-list"></div>
        <button onclick="handleLogout()" class="nav-btn" style="color: var(--danger); border: 1px solid rgba(244,63,94,0.2);">Sign Out</button>
    </nav>

    <div class="wrapper">
        <header class="top-bar">
            <div class="header-info">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
                <h2 id="page-title">PRF TRACKER</h2>
            </div>
            <div class="search-wrap"><input type="text" id="main-search" placeholder="Search data..." onkeyup="refreshTable()"></div>
            <div class="action-group">
                <button id="btn-toggle-comp" onclick="toggleCompleted()" class="btn-main btn-outline btn-completed">COMPLETED</button>
                <button onclick="exportToPDF()" class="btn-main btn-outline">EXPORT PDF</button>
                <button id="btn-create" onclick="openModal()" class="btn-main btn-primary">+ NEW ENTRY</button>
            </div>
        </header>

        <main class="main-content">
            <div class="table-container">
                <table>
                    <thead id="table-head"></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="entry-modal" class="overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <h2 id="modal-title" style="margin-bottom:20px; font-weight: 800;">NEW ENTRY</h2>
            <div id="prf-form">
                <input type="text" id="m-prf" placeholder="PRF NUMBER" class="remarks-editor" style="margin-bottom:12px;">
                <input type="text" id="m-asset" placeholder="ASSET NAME" class="remarks-editor" style="margin-bottom:12px;">
                <select id="m-workshop" class="remarks-editor" style="margin-bottom:20px; height: 45px; font-weight: 700;">
                    <option value="DAU/LOS">DAU/LOS</option><option value="EEW">EEW</option><option value="MRW">MRW</option>
                    <option value="MSH">MSH</option><option value="MWU">MWU</option><option value="NMU">NMU</option>
                    <option value="OSU">OSU</option><option value="PLU">PLU</option><option value="SMU">SMU</option>
                    <option value="STU">STU</option><option value="ADM">ADM</option><option value="INV">INV</option>
                </select>
                <button onclick="savePRF()" class="btn-main btn-primary" style="width:100%; justify-content: center; padding: 14px;">Upload & Link Form</button>
            </div>
            <div id="yard-form" style="display:none;">
                <input type="text" id="y-slot" placeholder="SLOT #" class="remarks-editor" style="margin-bottom:12px;">
                <input type="text" id="y-vessel" placeholder="ASSET NAME" class="remarks-editor" style="margin-bottom:12px;">
                <div style="margin-bottom:12px;">
                    <label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">DOCKING DATE</label>
                    <input type="date" id="y-docked" class="remarks-editor">
                </div>
                <div style="margin-bottom:20px;">
                    <label style="font-size: 10px; font-weight: 800; color: var(--text-muted);">EST. UNDOCK DATE</label>
                    <input type="date" id="y-est" class="remarks-editor">
                </div>
                <button onclick="saveYard()" class="btn-main btn-primary" style="width:100%; justify-content: center; padding: 14px;">Register Vessel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, set, onDisconnect } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD612DVL9xvsK1lWVyEB9TehpGJry6Rprw", 
            authDomain: "srd-portal-1234.firebaseapp.com", 
            projectId: "srd-portal-1234", 
            databaseURL: "https://srd-portal-1234-default-rtdb.firebaseio.com"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const STATUS_LIST = ["PENDING", "ITEM CREATION", "PR/MTR-RAISED", "PO-RAISED", "PAYMENT PENDING", "PART RECEIVED", "ALL RECEIVED", "ON-HOLD", "CANCELLED"];
        let logs = [], yardLogs = [], trans = [], currentPage = 'DASH', showCompleted = false;

        onAuthStateChanged(auth, user => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            if(user) {
                const userRef = ref(db, `status/${user.uid}`);
                set(userRef, { state: 'online', email: user.email });
                onDisconnect(userRef).remove();
                
                onValue(ref(db, 'status'), s => {
                    const data = s.val() || {};
                    document.getElementById('online-list').innerHTML = Object.values(data).map(u => `<div class="u-row"><span class="u-dot"></span>${u.email.split('@')[0].toUpperCase()}</div>`).join('');
                });

                onValue(ref(db, 'prf_logs'), s => { logs = s.val() ? Object.keys(s.val()).map(k => ({id:k, ...s.val()[k]})) : []; refreshTable(); });
                onValue(ref(db, 'yard_logs'), s => { yardLogs = s.val() ? Object.keys(s.val()).map(k => ({id:k, ...s.val()[k]})) : []; refreshTable(); });
                onValue(ref(db, 'transactions'), s => { trans = s.val() ? Object.values(s.val()).reverse() : []; refreshTable(); });
            }
        });

        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value).catch(e => alert("Login Failed"));
        window.handleLogout = () => signOut(auth);
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');

        window.switchPage = (p) => {
            currentPage = p;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + p.toLowerCase()).classList.add('active');
            document.getElementById('page-title').innerText = p === 'DASH' ? 'PRF TRACKER' : (p === 'YARD' ? 'BOAT YARD LOG' : 'TRANSACTION HISTORY');
            document.getElementById('btn-create').style.display = p === 'TRANS' ? 'none' : 'block';
            document.getElementById('btn-toggle-comp').style.display = p === 'DASH' ? 'block' : 'none';
            if(window.innerWidth <= 850) toggleSidebar();
            refreshTable();
        };

        window.toggleCompleted = () => {
            showCompleted = !showCompleted;
            document.getElementById('btn-toggle-comp').classList.toggle('active-toggle');
            refreshTable();
        };

        window.refreshTable = () => {
            const q = document.getElementById('main-search').value.toUpperCase();
            const body = document.getElementById('table-body');
            const head = document.getElementById('table-head');

            if(currentPage === 'DASH') {
                head.innerHTML = `<tr><th>Date</th><th>PRF #</th><th>Asset</th><th>Workshop</th><th>Status</th><th>Due Date</th><th>Remarks</th><th></th></tr>`;
                const filtered = logs.filter(l => (l.prf.includes(q) || l.asset.includes(q)) && (showCompleted ? l.status==='ALL RECEIVED' : l.status!=='ALL RECEIVED'));
                body.innerHTML = filtered.map(l => `
                    <tr>
                        <td data-label="Date Issued">${l.date}</td>
                        <td data-label="PRF #" style="font-weight:800; color:var(--brand);">${l.prf}</td>
                        <td data-label="Asset Name" style="font-weight:700;">${l.asset}</td>
                        <td data-label="Workshop">${l.workshop}</td>
                        <td data-label="Status">
                            <select class="status-select s-${l.status.replace(/[/ ]/g,'-')}" onchange="updatePRF('${l.id}','status',this.value)">
                                ${STATUS_LIST.map(s => `<option ${l.status===s?'selected':''}>${s}</option>`).join('')}
                            </select>
                        </td>
                        <td data-label="Due Date"><input type="date" value="${l.eta||''}" class="remarks-editor" style="border:none; padding:5px;" onchange="updatePRF('${l.id}','eta',this.value)"></td>
                        <td data-label="Remarks & History"><div class="remarks-editor" contenteditable="true" onblur="updatePRF('${l.id}','remarks',this.innerText.toUpperCase())">${l.remarks||''}</div></td>
                        <td data-label="Action"><button class="btn-delete" onclick="deleteEntry('prf_logs','${l.id}')">&times;</button></td>
                    </tr>`).join('');
            } else if(currentPage === 'YARD') {
                head.innerHTML = `<tr><th>Slot</th><th>Vessel</th><th>Docked</th><th>Est. Undock</th><th>Age</th><th>Status</th><th></th></tr>`;
                const filtered = yardLogs.filter(l => l.name.toUpperCase().includes(q) || l.slot.includes(q));
                body.innerHTML = filtered.map(l => {
                    const start = new Date(l.docked);
                    const end = l.status === 'Undocked' ? new Date(l.undocked) : new Date();
                    const age = Math.floor((end - start) / (1000 * 60 * 60 * 24)) || 0;
                    return `<tr>
                        <td data-label="Slot" style="font-weight:800; color:var(--brand);">${l.slot}</td>
                        <td data-label="Asset Name" style="font-weight:700;">${l.name}</td>
                        <td data-label="Docking Date">${l.docked}</td>
                        <td data-label="Est. Undock Date">${l.est || 'N/A'}</td>
                        <td data-label="Days in Yard"><span class="age-badge">${age} Days</span></td>
                        <td data-label="Status">
                            <select class="status-select s-${l.status}" onchange="updateYardStatus('${l.id}',this.value)">
                                <option ${l.status==='Docked'?'selected':''}>Docked</option>
                                <option ${l.status==='Undocked'?'selected':''}>Undocked</option>
                            </select>
                        </td>
                        <td data-label="Action"><button class="btn-delete" onclick="deleteEntry('yard_logs','${l.id}')">&times;</button></td>
                    </tr>`}).join('');
            } else {
                head.innerHTML = `<tr><th>Timestamp</th><th>Reference</th><th>Action Type</th><th>Value</th><th>User</th></tr>`;
                body.innerHTML = trans.filter(t => t.prf.includes(q) || t.action.includes(q)).map(t => `
                    <tr>
                        <td data-label="Time" style="color:var(--text-muted); font-size:11px;">${t.time}</td>
                        <td data-label="Ref" style="font-weight:800; color:var(--brand);">${t.prf}</td>
                        <td data-label="Action">${t.action}</td>
                        <td data-label="Details" style="font-style:italic;">${t.details}</td>
                        <td data-label="User" style="font-weight:700;">${t.user}</td>
                    </tr>`).join('');
            }
        };

        window.savePRF = () => {
            const p = document.getElementById('m-prf').value.toUpperCase(), a = document.getElementById('m-asset').value.toUpperCase();
            if(!p || !a) return alert("Required Fields Missing");
            push(ref(db, 'prf_logs'), { date: new Date().toLocaleDateString('en-GB'), prf: p, asset: a, workshop: document.getElementById('m-workshop').value, status: 'PENDING', remarks: '', eta: '' });
            closeModal();
            window.open("https://forms.office.com/pages/responsepage.aspx?id=rS-35FLkcEy4rMmBiUUcM-wq0ZU8I9BHssORFyfEW95UN0ZMM1gxR1YwUDZKMkNHMkhFMUdMRzlRSS4u", "_blank");
        };

        window.saveYard = () => {
            const s = document.getElementById('y-slot').value, v = document.getElementById('y-vessel').value, d = document.getElementById('y-docked').value;
            if(!s || !v || !d) return alert("Required Fields Missing");
            push(ref(db, 'yard_logs'), { slot: s, name: v.toUpperCase(), docked: d, est: document.getElementById('y-est').value, status: 'Docked', undocked: '' });
            closeModal();
        };

        window.updatePRF = (id, f, v) => { 
            update(ref(db, `prf_logs/${id}`), {[f]:v}); 
            const prfNum = logs.find(x=>x.id===id)?.prf || 'Unknown';
            push(ref(db, 'transactions'), { time: new Date().toLocaleString(), user: auth.currentUser.email.split('@')[0].toUpperCase(), action: `Update ${f}`, details: v, prf: prfNum });
        };

        window.updateYardStatus = (id, v) => {
            const upd = { status: v };
            if(v === 'Undocked') upd.undocked = new Date().toISOString().split('T')[0];
            update(ref(db, `yard_logs/${id}`), upd);
        };

        window.deleteEntry = (path, id) => { if(confirm("Delete this entry permanently?")) remove(ref(db, `${path}/${id}`)); };
        window.openModal = () => {
            document.getElementById('prf-form').style.display = currentPage === 'DASH' ? 'block' : 'none';
            document.getElementById('yard-form').style.display = currentPage === 'YARD' ? 'block' : 'none';
            document.getElementById('modal-title').innerText = currentPage === 'DASH' ? 'NEW PRF TRACKER ENTRY' : 'REGISTER VESSEL';
            document.getElementById('entry-modal').style.display = 'flex';
        };
        window.closeModal = () => document.getElementById('entry-modal').style.display = 'none';

        // THE EXPORT FUNCTION
        window.exportToPDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const dateStr = new Date().toLocaleString('en-GB');
            
            let headers = [], data = [], title = "";

            if(currentPage === 'DASH') {
                title = showCompleted ? "COMPLETED PRF REPORT" : "ACTIVE PRF TRACKER";
                headers = [['Date', 'PRF #', 'Asset Name', 'Workshop', 'Status', 'Due Date', 'Remarks']];
                data = logs.filter(l => showCompleted ? l.status==='ALL RECEIVED' : l.status!=='ALL RECEIVED')
                           .map(l => [l.date, l.prf, l.asset, l.workshop, l.status, l.eta||'N/A', l.remarks]);
            } else if(currentPage === 'YARD') {
                title = "BOAT YARD DOCKING LOG";
                headers = [['Slot', 'Asset Name', 'Docked Date', 'Est. Undock', 'Status']];
                data = yardLogs.map(l => [l.slot, l.name, l.docked, l.est||'N/A', l.status]);
            } else {
                title = "SYSTEM TRANSACTION HISTORY";
                headers = [['Timestamp', 'Ref', 'Action', 'Value', 'User']];
                data = trans.map(t => [t.time, t.prf, t.action, t.details, t.user]);
            }

            doc.setFontSize(18);
            doc.text(`MTCC SRD: ${title}`, 14, 15);
            doc.setFontSize(10);
            doc.text(`Generated On: ${dateStr}`, 14, 22);
            
            doc.autoTable({
                startY: 28, head: headers, body: data, theme: 'grid',
                headStyles: { fillStyle: [99, 102, 241], fontSize: 8 },
                styles: { fontSize: 7, cellPadding: 2 }
            });
            doc.save(`SRD_REPORT_${currentPage}_${Date.now()}.pdf`);
        };
    </script>
</body>
</html>
